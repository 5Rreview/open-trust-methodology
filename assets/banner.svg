<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E0E10"/>
      <stop offset="50%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#1C1C20"/>
    </linearGradient>
    <linearGradient id="star-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#F7A610"/>
      <stop offset="100%" stop-color="#F19314"/>
    </linearGradient>
    <linearGradient id="star-grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F19314" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7A610" stop-opacity="0"/>
      <stop offset="30%" stop-color="#F7A610" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFD54F" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#F7A610" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F7A610" stop-opacity="0"/>
    </linearGradient>
    <!-- Star path -->
    <path id="star-path" d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01z"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16"/>

  <!-- Diagonal lines decoration -->
  <line x1="900" y1="0" x2="1200" y2="300" stroke="#F7A610" stroke-opacity="0.04" stroke-width="80"/>
  <line x1="950" y1="0" x2="1250" y2="300" stroke="#F7A610" stroke-opacity="0.03" stroke-width="80"/>
  <line x1="1000" y1="0" x2="1300" y2="300" stroke="#F7A610" stroke-opacity="0.02" stroke-width="80"/>

  <!-- Decorative scattered stars -->
  <g opacity="0.12">
    <use href="#star-path" transform="translate(80,40) scale(1.2)" fill="url(#star-grad)"/>
    <use href="#star-path" transform="translate(180,220) scale(0.8)" fill="url(#star-grad)"/>
    <use href="#star-path" transform="translate(1050,50) scale(0.9)" fill="url(#star-grad)"/>
    <use href="#star-path" transform="translate(1100,200) scale(1.1)" fill="url(#star-grad)"/>
    <use href="#star-path" transform="translate(60,180) scale(0.6)" fill="url(#star-grad)"/>
    <use href="#star-path" transform="translate(1020,140) scale(0.7)" fill="url(#star-grad)"/>
    <use href="#star-path" transform="translate(250,60) scale(0.5)" fill="url(#star-grad)"/>
    <use href="#star-path" transform="translate(950,240) scale(0.6)" fill="url(#star-grad)"/>
  </g>

  <!-- Central icon star -->
  <g transform="translate(600,65)">
    <rect x="-28" y="-28" width="56" height="56" rx="14" fill="#1C1C20" stroke="#F7A610" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M0,-14 l4.33,8.78 9.69,1.41-7.01,6.83 1.65,9.65L0,8.2l-8.66,4.47 1.65-9.65-7.01-6.83 9.69-1.41z" fill="url(#star-grad)"/>
  </g>

  <!-- Badge: 5R★ · TRUST · AI · BUSINESS -->
  <rect x="440" y="105" width="320" height="28" rx="14" fill="none" stroke="#F7A610" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="124" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#F7A610" letter-spacing="2">5R★ · TRUST · AI · BUSINESS</text>

  <!-- Main title: 5★★★★★.com -->
  <g transform="translate(600,170)">
    <text text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-1">
      <tspan fill="white">5</tspan>
      <tspan fill="#F7A610">★★★★★</tspan>
      <tspan fill="white" font-size="36">.com</tspan>
    </text>
  </g>

  <!-- Horizontal line -->
  <rect x="100" y="195" width="1000" height="1" fill="url(#line-grad)" rx="0.5"/>

  <!-- Tagline -->
  <text x="600" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#A1A1AA" letter-spacing="4">REVIEWS YOU CAN TRUST</text>

  <!-- Subtitle -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717A" letter-spacing="1">Open Trust Platform · AI-Powered Review Analysis · 20 Languages</text>

  <!-- Bottom accent line -->
  <rect x="560" y="278" width="80" height="2" rx="1" fill="url(#star-grad)" opacity="0.4"/>
</svg>
