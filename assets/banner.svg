<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E0E10"/>
      <stop offset="50%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#1C1C20"/>
    </linearGradient>
    <radialGradient id="star-grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#F7A610"/>
      <stop offset="100%" stop-color="#F19314"/>
    </radialGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7A610" stop-opacity="0"/>
      <stop offset="30%" stop-color="#F7A610" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFD54F" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#F7A610" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F7A610" stop-opacity="0"/>
    </linearGradient>
    <!-- Original 5R★ brand star with cutout -->
    <symbol id="brand-star" viewBox="0 0 34 34">
      <path fill="url(#star-grad)" fill-rule="evenodd" clip-rule="evenodd" d="M20.8129 12.6806C20.9216 13.0075 21.2275 13.2281 21.572 13.2281H31.4939C32.2731 13.2281 32.5925 14.2287 31.9575 14.6802L23.5259 20.6741L17.051 25.2408L8.51725 31.278C7.88641 31.7242 7.05214 31.1054 7.29615 30.3722L10.3357 21.2391C10.4469 20.9048 10.3264 20.5371 10.0388 20.3335L2.05283 14.6811C1.41614 14.2305 1.73498 13.2281 2.51501 13.2281H12.4259C12.7704 13.2281 13.0763 13.0076 13.185 12.6807L16.2407 3.49738C16.4836 2.76743 17.5161 2.76751 17.7589 3.49751L20.8129 12.6806ZM24.3865 23.4532L18.6831 24.8696C18.0206 25.0341 17.8552 25.8994 18.4103 26.2967L25.4782 31.3542C26.1078 31.8047 26.9464 31.1873 26.7033 30.4523L24.3877 23.453Z"/>
      <path fill="#E07D00" opacity="0.5" d="M28 28C18 25 7.4 19.7 0.8 12L-2 14L-2 40L40 40L40 28Z"/>
    </symbol>
    <!-- Small decorative star (no cutout) -->
    <symbol id="deco-star" viewBox="0 0 34 34">
      <path fill="url(#star-grad)" fill-rule="evenodd" clip-rule="evenodd" d="M20.8129 12.6806C20.9216 13.0075 21.2275 13.2281 21.572 13.2281H31.4939C32.2731 13.2281 32.5925 14.2287 31.9575 14.6802L23.5259 20.6741L17.051 25.2408L8.51725 31.278C7.88641 31.7242 7.05214 31.1054 7.29615 30.3722L10.3357 21.2391C10.4469 20.9048 10.3264 20.5371 10.0388 20.3335L2.05283 14.6811C1.41614 14.2305 1.73498 13.2281 2.51501 13.2281H12.4259C12.7704 13.2281 13.0763 13.0076 13.185 12.6807L16.2407 3.49738C16.4836 2.76743 17.5161 2.76751 17.7589 3.49751L20.8129 12.6806Z"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16"/>

  <!-- Diagonal lines decoration -->
  <line x1="900" y1="0" x2="1200" y2="300" stroke="#F7A610" stroke-opacity="0.04" stroke-width="80"/>
  <line x1="950" y1="0" x2="1250" y2="300" stroke="#F7A610" stroke-opacity="0.03" stroke-width="80"/>
  <line x1="1000" y1="0" x2="1300" y2="300" stroke="#F7A610" stroke-opacity="0.02" stroke-width="80"/>

  <!-- Decorative scattered stars -->
  <g opacity="0.12">
    <use href="#deco-star" x="70" y="30" width="28" height="28"/>
    <use href="#deco-star" x="170" y="210" width="20" height="20"/>
    <use href="#deco-star" x="1040" y="40" width="22" height="22"/>
    <use href="#deco-star" x="1090" y="190" width="26" height="26"/>
    <use href="#deco-star" x="50" y="170" width="16" height="16"/>
    <use href="#deco-star" x="1010" y="130" width="18" height="18"/>
    <use href="#deco-star" x="240" y="50" width="14" height="14"/>
    <use href="#deco-star" x="940" y="230" width="16" height="16"/>
    <use href="#deco-star" x="140" y="120" width="12" height="12"/>
    <use href="#deco-star" x="1060" y="260" width="14" height="14"/>
  </g>

  <!-- Central icon star in rounded square -->
  <g transform="translate(572,30)">
    <rect width="56" height="56" rx="14" fill="#1C1C20" stroke="#F7A610" stroke-opacity="0.2" stroke-width="1"/>
    <use href="#brand-star" x="8" y="8" width="40" height="40"/>
  </g>

  <!-- Badge: 5R★ · TRUST · AI · BUSINESS -->
  <rect x="440" y="100" width="320" height="28" rx="14" fill="none" stroke="#F7A610" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="119" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#F7A610" letter-spacing="2">5R★ · TRUST · AI · BUSINESS</text>

  <!-- Main title: 5 + brand stars + .com -->
  <g transform="translate(600,168)">
    <!-- "5" -->
    <text x="-195" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="800" fill="white">5</text>
    <!-- 5 original brand stars in a row -->
    <use href="#brand-star" x="-160" y="-36" width="44" height="44"/>
    <use href="#brand-star" x="-112" y="-36" width="44" height="44"/>
    <use href="#brand-star" x="-64" y="-36" width="44" height="44"/>
    <use href="#brand-star" x="-16" y="-36" width="44" height="44"/>
    <use href="#brand-star" x="32" y="-36" width="44" height="44"/>
    <!-- ".com" -->
    <text x="86" text-anchor="start" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" fill="white">.com</text>
  </g>

  <!-- Horizontal line -->
  <rect x="100" y="195" width="1000" height="1" fill="url(#line-grad)" rx="0.5"/>

  <!-- Tagline -->
  <text x="600" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="#A1A1AA" letter-spacing="4">REVIEWS YOU CAN TRUST</text>

  <!-- Subtitle -->
  <text x="600" y="258" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#71717A" letter-spacing="1">Open Trust Platform · AI-Powered Review Analysis · 20 Languages</text>

  <!-- Bottom accent line -->
  <rect x="560" y="278" width="80" height="2" rx="1" fill="url(#star-grad)" opacity="0.4"/>
</svg>
